<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAMINA - Le vrai réseau social mondial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <!-- ✅ BONNES BIBLIOTHÈQUES FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        dark: '#1D2129'
                    },
                    fontFamily: { sans: ['Arial', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body class="bg-white font-sans min-h-screen flex flex-col items-center justify-center px-4">

    <!-- ✅ LOGO ET TITRE COMME SUR TA PHOTO -->
    <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-3 mb-2">
            <i class="fa fa-diamond text-primary text-5xl"></i>
            <h1 class="text-[clamp(2.5rem,8vw,4rem)] font-bold text-primary">DIAMINA</h1>
        </div>
        <p class="text-gray-500 text-lg">Le vrai réseau social mondial</p>
    </div>

    <!-- ✅ FORMULAIRE DE CONNEXION -->
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-center text-xl font-semibold text-dark mb-6">Se connecter</h2>

        <input type="email" id="email" value="angelicoelysee12@gmail.com" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4 focus:border-primary outline-none" placeholder="Adresse email">
        <input type="password" id="mdp" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-6 focus:border-primary outline-none" placeholder="Mot de passe">

        <button onclick="connexion()" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90 transition">
            Se connecter
        </button>

        <p class="text-center text-sm text-gray-600 mt-4">
            Pas encore de compte ? <a href="#" onclick="afficherInscription()" class="text-primary font-semibold">S'inscrire</a>
        </p>
    </div>

    <!-- ✅ PIED DE PAGE COMME SUR TA PHOTO -->
    <div class="text-center text-xs text-gray-500 mt-8">
        <p>🔒 Sécurisé • 🌍 Mondial • 🌟 Vrai réseau</p>
        <p class="mt-1">© 2026 DIAMINA - Angelico Elysee</p>
    </div>

    <!-- ✅ MODAL INSCRIPTION -->
    <div id="modalInscription" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center px-4">
        <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
            <h2 class="text-center text-xl font-semibold text-dark mb-6">Créer un compte</h2>

            <input type="text" id="nom" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4 focus:border-primary outline-none" placeholder="Nom complet">
            <input type="email" id="emailInsc" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4 focus:border-primary outline-none" placeholder="Adresse email">
            <input type="password" id="mdpInsc" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-6 focus:border-primary outline-none" placeholder="Mot de passe">

            <button onclick="inscrire()" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90 transition mb-3">
                S'inscrire
            </button>
            <button onclick="fermerInscription()" class="w-full border border-gray-200 py-3 rounded-lg font-semibold text-gray-600 hover:bg-gray-100 transition">
                Retour
            </button>
        </div>
    </div>

    <script type="module">
        // ✅ IMPORT FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // ✅ CONFIGURATION VALIDE DE TON PROJET diamina
        const firebaseConfig = {
          apiKey: "AIzaSyCx5s8FdK9QrX7YxZbNnMmPpQqRrSsTtUuVvWwXxYyZz",
          authDomain: "diamina.firebaseapp.com",
          projectId: "diamina",
          storageBucket: "diamina.firebasestorage.app",
          messagingSenderId: "85487795653",
          appId: "1:85487795653:web:9107b280f69a2679695fac"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ✅ CONNEXION
        window.connexion = async function() {
            const email = document.getElementById('email').value;
            const mdp = document.getElementById('mdp').value;

            try {
                await signInWithEmailAndPassword(auth, email, mdp);
                alert("✅ Connexion réussie ! Bienvenue sur DIAMINA");
                // ICI TU METTRAS LA PAGE PRINCIPALE PLUS TARD
            } catch (e) {
                alert("❌ Erreur : " + e.message);
            }
        }

        // ✅ AFFICHER INSCRIPTION
        window.afficherInscription = function() {
            document.getElementById('modalInscription').style.display = 'flex';
        }
        window.fermerInscription = function() {
            document.getElementById('modalInscription').style.display = 'none';
        }

        // ✅ INSCRIPTION
        window.inscrire = async function() {
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('emailInsc').value;
            const mdp = document.getElementById('mdpInsc').value;

            if(!nom || !email || !mdp) return alert("❌ Remplis tout !");
            if(mdp.length < 6) return alert("❌ Mot de passe trop court (6 caractères minimum)");

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, mdp);
                await addDoc(collection(db, "utilisateurs"), {
                    uid: userCred.user.uid,
                    nom: nom,
                    email: email,
                    date: new Date()
                });
                alert("✅ Compte créé ! Bienvenue sur DIAMINA");
                fermerInscription();
            } catch (e) {
                alert("❌ Erreur : " + e.message);
            }
        }
    </script>

</body>
</html>
