<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DIAMINA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <h1>💎 DIAMINA</h1>
    <p>Le vrai réseau social mondial</p>

    <hr>

    <h3>Créer un compte</h3>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="mdp" placeholder="Mot de passe"><br><br>
    <button onclick="creerCompte()">S'inscrire</button>

    <script>
        // ✅ TES CLÉS EXACTES, RIEN D'AUTRE
        const firebaseConfig = {
          apiKey: "AIzaSyAromnB7EZNw6dcK6ZlPqP_RSmR5220Tm4",
          authDomain: "diamina-reel.firebaseapp.com",
          projectId: "diamina-reel",
          storageBucket: "diamina-reel.firebasestorage.app",
          messagingSenderId: "231259972522",
          appId: "1:231259972522:web:56253de02a1eabb28c01d3"
        };

        // Initialisation SIMPLE
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function creerCompte() {
            const email = document.getElementById('email').value;
            const mdp = document.getElementById('mdp').value;

            auth.createUserWithEmailAndPassword(email, mdp)
            .then(() => alert("✅ ÇA MARCHE ! Compte créé !"))
            .catch(err => alert("❌ Erreur : " + err.message));
        }
    </script>

</body>
</html>
