<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAMINA - Le vrai réseau social mondial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <!-- ✅ BONNES BIBLIOTHÈQUES FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#165DFF', dark: '#1D2129' },
                    fontFamily: { sans: ['Arial', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin:0; padding:0; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4">

    <!-- ✅ LOGO ET TITRE COMME TA PHOTO -->
    <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-3 mb-2">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="#165DFF">
                <path d="M12 2L2 8L12 22L22 8L12 2Z"/>
            </svg>
            <h1 class="text-[clamp(2.5rem,8vw,4rem)] font-bold text-[#165DFF] m-0">DIAMINA</h1>
        </div>
        <p class="text-gray-500 text-lg m-0">Le vrai réseau social mondial</p>
    </div>

    <!-- ✅ FORMULAIRE CONNEXION -->
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-center text-xl font-semibold text-dark mb-6">Se connecter</h2>

        <input type="email" id="email" value="angelicoelysee12@gmail.com" 
            class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4 outline-none" 
            placeholder="Adresse email">

        <input type="password" id="mdp" 
            class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-6 outline-none" 
            placeholder="Mot de passe">

        <button onclick="connexion()" 
            class="w-full bg-[#165DFF] text-white py-3 rounded-lg font-semibold hover:bg-[#165DFF]/90 border-none cursor-pointer">
            Se connecter
        </button>

        <p class="text-center text-sm text-gray-600 mt-4">
            Pas encore de compte ? <a href="#" onclick="afficherInscription()" class="text-[#165DFF] font-semibold">S'inscrire</a>
        </p>
    </div>

    <!-- ✅ PIED DE PAGE -->
    <div class="text-center text-xs text-gray-500 mt-8">
        <p>🔒 Sécurisé • 🌍 Mondial • 🌟 Vrai réseau</p>
        <p class="mt-1">© 2026 DIAMINA - Angelico Elysee</p>
    </div>

    <!-- ✅ MODAL INSCRIPTION -->
    <div id="modalInscription" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center px-4">
        <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
            <h2 class="text-center text-xl font-semibold text-dark mb-6">Créer un compte</h2>
            <input type="text" id="nom" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4" placeholder="Nom complet">
            <input type="email" id="emailInsc" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-4" placeholder="Adresse email">
            <input type="password" id="mdpInsc" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-6" placeholder="Mot de passe">
            <button onclick="inscrire()" class="w-full bg-[#165DFF] text-white py-3 rounded-lg mb-3">S'inscrire</button>
            <button onclick="fermerInscription()" class="w-full border py-3 rounded-lg">Retour</button>
        </div>
    </div>

    <script type="module">
        // ✅ Import des fonctions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // ✅ TA CONFIGURATION EXACTE (copiée de ton écran)
        const firebaseConfig = {
          apiKey: "AIzaSyDDaBfNsXvoJ6j8qYp3hhkTMMcbu5Yz9QU",
          authDomain: "diamina-83677.firebaseapp.com",
          projectId: "diamina-83677",
          storageBucket: "diamina-83677.firebasestorage.app",
          messagingSenderId: "85487795653",
          appId: "1:85487795653:web:9107b280f69a2679695fac"
        };

        // ✅ Initialisation Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ✅ CONNEXION
        window.connexion = async function() {
            const email = document.getElementById('email').value;
            const mdp = document.getElementById('mdp').value;
            try {
                await signInWithEmailAndPassword(auth, email, mdp);
                alert("✅ Connexion réussie ! Bienvenue sur DIAMINA");
            } catch (e) {
                alert("❌ Erreur : " + e.message);
            }
        }

        // ✅ INSCRIPTION
        window.afficherInscription = () => document.getElementById('modalInscription').style.display = 'flex';
        window.fermerInscription = () => document.getElementById('modalInscription').style.display = 'none';

        window.inscrire = async function() {
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('emailInsc').value;
            const mdp = document.getElementById('mdpInsc').value;
            if(!nom || !email || !mdp) return alert("❌ Remplis tout !");
            if(mdp.length < 6) return alert("❌ Mot de passe 6 caractères minimum");
            try {
                const user = await createUserWithEmailAndPassword(auth, email, mdp);
                await addDoc(collection(db, "utilisateurs"), {uid:user.user.uid, nom, email, date:new Date()});
                alert("✅ Compte créé !");
                fermerInscription();
            } catch (e) {
                alert("❌ Erreur : " + e.message);
            }
        }
    </script>

</body>
</html>
